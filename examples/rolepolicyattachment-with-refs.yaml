# Example 1: RolePolicyAttachment using Kubernetes references
# This is the recommended pattern when you want to manage Role and Policy as ACK CRs too.

---
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: my-app-role
spec:
  name: my-app-role
  assumeRolePolicyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Service": "ec2.amazonaws.com"
          },
          "Action": "sts:AssumeRole"
        }
      ]
    }

---
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: s3-read-only
spec:
  name: s3-read-only-policy
  policyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": [
            "s3:ListBucket",
            "s3:GetObject"
          ],
          "Resource": "*"
        }
      ]
    }

---
apiVersion: iam.services.k8s.aws/v1alpha1
kind: RolePolicyAttachment
metadata:
  name: attach-s3-read
spec:
  # Use references to other ACK resources
  roleRef:
    from:
      name: my-app-role
  policyRef:
    from:
      name: s3-read-only
